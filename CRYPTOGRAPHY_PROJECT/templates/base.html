<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovaGuard WiFi Sentinel</title>
  <link rel="icon" href="/static/img/shield.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark nav-neon">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><i class="bi bi-shield-lock me-2"></i>NovaGuard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/scanner">Scanner</a></li>
          <li class="nav-item"><a class="nav-link" href="/analysis">Security Analysis</a></li>
          <li class="nav-item"><a class="nav-link" href="/logs">Attack Logs</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="alerts" class="position-fixed top-0 end-0 p-3" style="z-index:1100"></div>

  <main class="container-fluid py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted small py-3">
    NovaGuard WiFi Sentinel • Real-time Fake WiFi Detection
  </footer>

  <script>window.SCAPY_AVAILABLE={{ SCAPY_AVAILABLE|tojson }}; window.PYPYWI_AVAILABLE={{ PYPYWI_AVAILABLE|tojson }};</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
