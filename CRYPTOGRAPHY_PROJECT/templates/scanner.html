{% extends 'base.html' %}
{% block content %}
<div class="panel panel-neon">
  <div class="panel-header d-flex justify-content-between align-items-center">
    <span><i class="bi bi-search me-2"></i>Network Scanner</span>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="toggle-connected-only">
      <label class="form-check-label" for="toggle-connected-only">Connected only</label>
    </div>
  </div>
  <div class="panel-body">
    <div class="table-responsive">
      <table class="table table-dark table-striped align-middle" id="table-scanner">
        <thead>
          <tr>
            <th>SSID</th>
            <th>BSSID</th>
            <th>Signal</th>
            <th>Channel</th>
            <th>Encryption</th>
            <th>Risk</th>
            <th>Alerts</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
